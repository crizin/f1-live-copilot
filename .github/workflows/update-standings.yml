name: Update standings

on:
  # Daily at 06:00 UTC (15:00 KST). Most race weekends are done by then.
  # If no new race happened, the diff is empty and the workflow no-ops.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-standings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv run --extra dev dev/update-standings.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/; then
            echo "No changes to standings — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/standings-*.md
          git commit -m "chore(data): auto-update standings"
          git push
