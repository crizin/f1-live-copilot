name: Update storylines

on:
  # Monday 07:00 UTC (16:00 KST) — race weekend has wrapped, news cycle settled.
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: update-storylines
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-action@64b15918b6adcacf73f6934948f1951ead020cbf # v1.0.111
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Update data/storylines.md with recent F1 2026 news.

            Procedure:
            1. Read data/storylines.md and note its current "Last update" date.
            2. Use WebSearch to find F1 2026 events that happened AFTER that date.
               Focus on: race weekends (recap, key incidents), driver/team news,
               regulation drama, paddock controversies, viral fan moments.
            3. Update the file:
               - Add new items to existing sections (Big Stories, Rivalries,
                 Memes & Fan Culture, Recent Incidents & Controversies).
               - Refresh existing storylines only if status changed materially.
               - Update the "Last update" line at the top.
               - Keep tone conversational; this feeds a race-watching companion,
                 not a news article.
            4. If nothing significant happened since the last update, leave the
               file unchanged. Empty diff is a valid outcome.
            5. Do NOT fabricate events. If a search returns nothing concrete,
               skip that item. Cite no sources you did not actually fetch.
            6. Do NOT run git commit or git push. Just edit the file in place;
               a later step opens the PR.
          claude_args: '--model claude-sonnet-4-6 --max-turns 25 --allowed-tools "Read,Edit,WebSearch,WebFetch"'

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: storylines/auto-update
          delete-branch: true
          commit-message: "chore(data): auto-update storylines"
          title: "chore(data): auto-update storylines"
          body: |
            Auto-generated update by Claude Code Action.

            ⚠️ AI-curated content can hallucinate or surface unreliable sources.
            Verify each new item before merging.
          labels: |
            ai-generated
            data-update
