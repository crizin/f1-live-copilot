name: Claude PR mention

# Lets repo members write "@claude <instruction>" in a PR comment to have
# Claude Code apply the fix and push it back to the PR branch.
#
# When the instruction is vague ("@claude fix it"), Claude defaults to
# applying the latest Codex cross-check verdicts as a checklist.

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  # Sequence multiple @claude mentions on the same PR; never cancel in-flight.
  group: claude-mention-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  fix:
    # Gate:
    #   1. Comment is on a PR (not a plain issue).
    #   2. Comment body contains @claude.
    #   3. Author has write access (blocks drive-by triggers from external visitors).
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '@claude') &&
      (github.event.comment.author_association == 'OWNER' ||
       github.event.comment.author_association == 'MEMBER' ||
       github.event.comment.author_association == 'COLLABORATOR')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR head ref
        id: prhead
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          head=$(gh pr view ${{ github.event.issue.number }} --repo "${{ github.repository }}" --json headRefName --jq '.headRefName')
          echo "ref=$head" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.prhead.outputs.ref }}

      # Stage everything Claude needs as plain files.
      # Stops it from spending turns on `gh` calls or PR API exploration.
      - name: Stage Claude inputs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p /tmp/cc

          # The user's @claude comment.
          printf '%s' "$COMMENT_BODY" > /tmp/cc/user-comment.md

          # The most recent Codex cross-check comment in this PR's thread.
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
            --jq '.[] | select(.body | startswith("## 🤖 Codex cross-check")) | .body' \
            | tail -c 200000 > /tmp/cc/codex-review.md
          if [ ! -s /tmp/cc/codex-review.md ]; then
            echo "No Codex cross-check comment found on PR #$PR_NUMBER" >&2
            echo "_(no Codex cross-check comment found yet — proceed using only the user's instruction)_" > /tmp/cc/codex-review.md
          fi

      - uses: anthropics/claude-code-action@fefa07e9c665b7320f08c3b525980457f22f58aa # v1.0.111
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Apply review feedback to data/storylines.md.

            Inputs you must read first:
              /tmp/cc/user-comment.md   — the @claude mention you're responding to
              /tmp/cc/codex-review.md   — Codex (GPT-5)'s claim-by-claim verdicts
              data/storylines.md        — the file to edit (in current directory)

            Procedure:

            1. Read all three files.

            2. If /tmp/cc/user-comment.md contains specific instructions, follow
               those. If it's vague (e.g. "fix it", "apply review", "do it"),
               apply the Codex verdicts as defaults:
                 VERIFIED       → keep as-is
                 PARTIAL        → tighten the wording to the verifiable subset;
                                  drop the parts the source doesn't support
                 UNSUPPORTED    → remove the item entirely
                 CONTRADICTED   → rewrite to match what the source actually
                                  says, or remove if not salvageable

            3. Edit data/storylines.md efficiently. Plan all edits up front
               from a single Read; then apply them in as few Edit calls as
               possible. Do NOT re-read the file between edits.

            4. After editing, write a one-line summary to
               /tmp/cc/summary.txt in the format:
                 "Removed N unsupported, fixed K contradicted, tightened M partials, kept V verified."

            5. Stop. You only have Read/Edit/Write — do NOT try to run shell,
               git, or gh commands. A later workflow step handles commit + push.
          claude_args: '--model opus --max-turns 40 --allowed-tools "Read,Edit,Write"'

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/storylines.md; then
            echo "No changes — Claude did not modify storylines.md."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/storylines.md
          git commit -m "chore(data): apply review feedback to storylines"
          git push

      - name: Post summary comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -s /tmp/cc/summary.txt ]; then
            {
              echo "🤖 Applied review feedback:"
              echo
              cat /tmp/cc/summary.txt
            } | gh pr comment "$PR_NUMBER" --body-file -
          fi
